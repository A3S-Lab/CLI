name: CI
on:
  push: { branches: [main] }
  pull_request: { branches: [main] }
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with: { components: "rustfmt, clippy" }
      - name: Use published A3S crates
        run: bash .github/scripts/use-published-a3s-crates.sh
      - run: cargo fmt --all -- --check
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo test --all-targets
      - run: cargo build --release

  release-macos-sandbox:
    name: Verify release macOS sandbox host
    runs-on: macos-15-intel
    steps:
      - name: Exercise the native Seatbelt entrypoint
        run: |
          set -euo pipefail
          test -x /usr/bin/sandbox-exec
          /usr/bin/sandbox-exec \
            -p '(version 1) (allow default)' \
            /usr/bin/true

  # Validate the TUI compiles for Windows + macOS so all three desktop
  # platforms can run `a3s code` (Linux is covered by `check` above).
  cross:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Use published A3S crates
        shell: bash
        run: bash .github/scripts/use-published-a3s-crates.sh
      - name: Test TUI exit regression
        if: runner.os == 'macOS'
        run: cargo test --locked --test tui_exit -- --nocapture
      - run: cargo build --release
        env:
          # Cross-platform PR validation does not need LTO, and rustc 1.97 can
          # segfault while optimizing chromiumoxide_cdp on macOS arm64.
          CARGO_PROFILE_RELEASE_LTO: "false"
