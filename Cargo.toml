[package]
name = "a3s"
version = "0.5.1"
edition = "2021"
description = "a3s — A3S coding agent CLI; `a3s code` launches the interactive TUI"
license = "MIT"
repository = "https://github.com/A3S-Lab/Cli"
homepage = "https://github.com/A3S-Lab/a3s"
keywords = ["a3s", "cli", "agent", "tui", "coding"]
categories = ["command-line-utilities"]

[[bin]]
name = "a3s"
path = "src/main.rs"

[dependencies]
a3s-code-core = "4.2.3"
a3s-tui = { git = "https://github.com/A3S-Lab/TUI.git", rev = "7ac056d949695e241afdb01819781bc9e775548b" }
tokio = { version = "1", features = ["rt-multi-thread", "macros", "sync", "time"] }
anyhow = "1"
serde_json = "1"
similar = "2"
image = { version = "0.25", default-features = false, features = ["png", "jpeg", "gif", "webp"] }
# Codex account client (custom LlmClient over the ChatGPT backend).
async-trait = "0.1"
tokio-util = "0.7"
base64 = "0.22"
futures = "0.3"

[profile.release]
opt-level = "z"
lto = true
strip = true
